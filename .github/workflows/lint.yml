name: Lint and Format
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting and linting
        uses: astral-sh/ruff-action@v1
        with:
          args: "check --output-format=github"

      - name: Check formatting
        uses: astral-sh/ruff-action@v1
        with:
          args: "format --check"